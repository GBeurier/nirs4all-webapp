appId: com.nirs4all.webapp
productName: nirs4all Studio
copyright: Copyright 2025-2026

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  # dist-electron/main.cjs loads the shared Python runtime config at startup.
  - scripts/python-runtime-config.cjs
  - recommended-config.json
  - "!**/*.map"

# Installer builds ship backend source only.
# Python is downloaded / managed at runtime in user data.
extraResources:
  - from: LICENSE
    to: LICENSE
  - from: LICENSE_FR
    to: LICENSE_FR
  - from: README_LICENSE.md
    to: README_LICENSE.md
  - from: README_LICENSE_FR.md
    to: README_LICENSE_FR.md
  - from: THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: THIRD_PARTY_NOTICES_FR.md
    to: THIRD_PARTY_NOTICES_FR.md
  - from: LICENSES/
    to: LICENSES/
    filter:
      - "**/*"
  - from: backend-dist/
    to: backend/
    filter:
      - "api/**/*"
      - "websocket/**/*"
      - "updater/**/*"
      - "main.py"
      - "public/**/*"
      - "recommended-config.json"
      - "version.json"

asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: public/nirs4all.ico
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

portable:
  artifactName: "${productName}-${version}-win-${arch}-portable.${ext}"

nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  installerIcon: public/nirs4all.ico
  uninstallerIcon: public/nirs4all.ico
  installerHeaderIcon: public/nirs4all.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: nirs4all Studio

mac:
  target:
    - target: dmg
  icon: public/nirs4all_logo.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: public/nirs4all_logo.png
  category: Science
  maintainer: nirs4all
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"

appImage:
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1

publish:
  provider: github
  owner: GBeurier
  repo: nirs4all-webapp
