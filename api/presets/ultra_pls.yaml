id: ultra_pls
name: Ultra PLS
description: Large cartesian chemometric exploration with PLS, OPLS, IKPLS-style linear
  models, and tuned Ridge.
complexity: 7
default_variant: regression
variants:
  regression:
    format: yaml
    pipeline:
    - _cartesian_:
      - _or_:
        - null
        - nirs4all.operators.transforms.scalers.StandardNormalVariate
        - nirs4all.operators.transforms.nirs.MultiplicativeScatterCorrection
        - class: nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
          params:
            degree: 1
        - nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
      - _or_:
        - null
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            deriv: 2
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
            sigma: 2
        - class: nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
          params:
            level: 3
        - nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
      - _or_:
        - null
        - nirs4all.operators.transforms.nirs.ASLSBaseline
        - class: nirs4all.operators.transforms.nirs.ASLSBaseline
          params:
            lam: 100000.0
        - nirs4all.operators.transforms.signal.Detrend
      - _or_:
        - null
        - nirs4all.operators.transforms.orthogonalization.OSC
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 2
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 3
        - class: nirs4all.operators.transforms.feature_selection.FlexiblePCA
          params:
            n_components: 0.25
      count: 240
    - class: sklearn.model_selection._split.KFold
      params:
        n_splits: 3
        shuffle: true
        random_state: 42
    - class: sklearn.preprocessing._data.StandardScaler
      params:
        with_std: false
    - model:
        class: sklearn.cross_decomposition._pls.PLSRegression
        params:
          n_components: 15
          scale: false
      name: PLS-15
    - model:
        class: nirs4all.operators.models.sklearn.opls.OPLS
        params:
          n_components: 2
          pls_components: 15
          backend: numpy
      name: OPLS
    - model:
        class: nirs4all.operators.models.sklearn.ikpls.IKPLS
        params:
          n_components: 15
          backend: numpy
      name: IKPLS
    - model: sklearn.linear_model._ridge.Ridge
      name: Ridge-Finetuned
      finetune_params:
        n_trials: 60
        sampler: tpe
        model_params:
          alpha:
          - float_log
          - 1.0e-05
          - 10000.0
          fit_intercept:
          - categorical
          - - true
            - false
          solver:
          - categorical
          - - auto
            - svd
            - cholesky
            - lsqr
  classification:
    format: yaml
    pipeline:
    - _cartesian_:
      - _or_:
        - null
        - nirs4all.operators.transforms.scalers.StandardNormalVariate
        - nirs4all.operators.transforms.nirs.MultiplicativeScatterCorrection
        - class: nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
          params:
            degree: 1
        - nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
      - _or_:
        - null
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            deriv: 2
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
            sigma: 2
        - class: nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
          params:
            level: 3
        - nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
      - _or_:
        - null
        - nirs4all.operators.transforms.nirs.ASLSBaseline
        - class: nirs4all.operators.transforms.nirs.ASLSBaseline
          params:
            lam: 100000.0
        - nirs4all.operators.transforms.signal.Detrend
      - _or_:
        - null
        - nirs4all.operators.transforms.orthogonalization.OSC
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 2
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 3
        - class: nirs4all.operators.transforms.feature_selection.FlexiblePCA
          params:
            n_components: 0.25
      count: 240
    - class: sklearn.model_selection._split.StratifiedKFold
      params:
        n_splits: 3
        shuffle: true
        random_state: 42
    - class: sklearn.preprocessing._data.StandardScaler
      params:
        with_std: false
    - model:
        class: nirs4all.operators.models.sklearn.plsda.PLSDA
        params:
          n_components: 15
      name: PLSDA-15
    - model:
        class: nirs4all.operators.models.sklearn.oplsda.OPLSDA
        params:
          n_components: 1
          pls_components: 15
      name: OPLSDA
    - model:
        class: nirs4all.operators.models.sklearn.aom_pls_classifier.AOMPLSClassifier
        params:
          n_components: 15
      name: AOM-PLS
    - model: sklearn.linear_model._ridge.RidgeClassifier
      name: RidgeClassifier-Finetuned
      finetune_params:
        n_trials: 40
        sampler: tpe
        model_params:
          alpha:
          - float_log
          - 1.0e-05
          - 10000.0
          fit_intercept:
          - categorical
          - - true
            - false
