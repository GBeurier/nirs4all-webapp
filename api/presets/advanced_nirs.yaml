id: advanced_nirs
name: Advanced NIRS Pipeline
description: Comprehensive NIRS preprocessing with OPLS
task_type: regression
pipeline:
- nirs4all.operators.transforms.nirs.ASLSBaseline
- nirs4all.operators.transforms.scalers.StandardNormalVariate
- class: nirs4all.operators.transforms.nirs.SavitzkyGolay
  params:
    window_length: 15
    polyorder: 2
    deriv: 1
- nirs4all.operators.splitters.splitters.SPXYGFold
- model:
    class: nirs4all.operators.models.sklearn.opls.OPLS
    params:
      n_components: 10
