id: advanced_nirs
name: Advanced NIRS Pipeline
description: Comprehensive NIRS preprocessing for regression and classification
default_variant: regression
variants:
  regression:
    format: yaml
    pipeline:
    - nirs4all.operators.transforms.nirs.ASLSBaseline
    - nirs4all.operators.transforms.scalers.StandardNormalVariate
    - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
      params:
        window_length: 15
        polyorder: 2
        deriv: 1
    - nirs4all.operators.splitters.splitters.SPXYGFold
    - model:
        class: nirs4all.operators.models.sklearn.opls.OPLS
        params:
          n_components: 10
  classification:
    format: yaml
    pipeline:
    - nirs4all.operators.transforms.nirs.ASLSBaseline
    - nirs4all.operators.transforms.scalers.StandardNormalVariate
    - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
      params:
        window_length: 15
        polyorder: 2
        deriv: 1
    - class: sklearn.model_selection._split.StratifiedKFold
      params:
        shuffle: true
        random_state: 42
    - model:
        class: nirs4all.operators.models.sklearn.oplsda.OPLSDA
        params:
          n_components: 10
