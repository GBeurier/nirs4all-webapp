id: pls_derivative
name: PLS with Derivative
description: PLS templates with first derivative preprocessing
default_variant: regression
variants:
  regression:
    format: yaml
    pipeline:
    - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
      params:
        polyorder: 2
        deriv: 1
    - nirs4all.operators.transforms.scalers.StandardNormalVariate
    - sklearn.model_selection._split.KFold
    - model:
        class: sklearn.cross_decomposition._pls.PLSRegression
        params:
          n_components: 15
  classification:
    format: yaml
    pipeline:
    - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
      params:
        polyorder: 2
        deriv: 1
    - nirs4all.operators.transforms.scalers.StandardNormalVariate
    - class: sklearn.model_selection._split.StratifiedKFold
      params:
        shuffle: true
        random_state: 42
    - model:
        class: nirs4all.operators.models.sklearn.plsda.PLSDA
        params:
          n_components: 15
