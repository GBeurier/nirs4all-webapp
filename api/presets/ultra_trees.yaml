id: ultra_trees
name: Ultra Trees
description: Bigger preprocessing search with tuned LightGBM, RandomForest, XGBoost,
  ExtraTrees, and GradientBoosting.
complexity: 8
default_variant: regression
variants:
  regression:
    format: yaml
    pipeline:
    - _cartesian_:
      - _or_:
        - null
        - nirs4all.operators.transforms.scalers.StandardNormalVariate
        - nirs4all.operators.transforms.nirs.MultiplicativeScatterCorrection
        - class: nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
          params:
            degree: 1
        - nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
      - _or_:
        - null
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            deriv: 2
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
            sigma: 2
        - class: nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
          params:
            level: 3
        - nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
      - _or_:
        - null
        - nirs4all.operators.transforms.nirs.ASLSBaseline
        - class: nirs4all.operators.transforms.nirs.ASLSBaseline
          params:
            lam: 100000.0
        - nirs4all.operators.transforms.signal.Detrend
      - _or_:
        - null
        - nirs4all.operators.transforms.orthogonalization.OSC
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 2
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 3
        - class: nirs4all.operators.transforms.feature_selection.FlexiblePCA
          params:
            n_components: 0.25
      count: 80
    - class: nirs4all.operators.splitters.splitters.SPXYFold
      params:
        n_splits: 3
        random_state: 42
    - model:
        class: lightgbm.LGBMRegressor
        params:
          random_state: 42
          verbose: -1
      name: LightGBM-Finetuned
      finetune_params:
        n_trials: 35
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 100
          - 600
          max_depth:
          - int
          - 3
          - 12
          learning_rate:
          - float_log
          - 0.01
          - 0.2
          num_leaves:
          - int
          - 15
          - 127
          subsample:
          - float
          - 0.7
          - 1.0
    - model:
        class: sklearn.ensemble._forest.RandomForestRegressor
        params:
          random_state: 42
      name: RandomForest-Finetuned
      finetune_params:
        n_trials: 25
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 200
          - 800
          max_depth:
          - int
          - 4
          - 20
          min_samples_leaf:
          - int
          - 1
          - 5
          min_samples_split:
          - int
          - 2
          - 12
    - model:
        class: xgboost.XGBRegressor
        params:
          random_state: 42
          verbosity: 0
      name: XGBoost-Finetuned
      finetune_params:
        n_trials: 35
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 100
          - 600
          max_depth:
          - int
          - 3
          - 10
          learning_rate:
          - float_log
          - 0.01
          - 0.2
          subsample:
          - float
          - 0.7
          - 1.0
          colsample_bytree:
          - float
          - 0.6
          - 1.0
    - model:
        class: sklearn.ensemble._forest.ExtraTreesRegressor
        params:
          random_state: 42
      name: ExtraTrees-Finetuned
      finetune_params:
        n_trials: 20
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 200
          - 800
          max_depth:
          - int
          - 4
          - 20
          min_samples_leaf:
          - int
          - 1
          - 5
    - model:
        class: sklearn.ensemble._gb.GradientBoostingRegressor
        params:
          random_state: 42
      name: GradientBoosting-Finetuned
      finetune_params:
        n_trials: 20
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 100
          - 500
          learning_rate:
          - float_log
          - 0.01
          - 0.2
          max_depth:
          - int
          - 2
          - 6
          subsample:
          - float
          - 0.7
          - 1.0
  classification:
    format: yaml
    pipeline:
    - _cartesian_:
      - _or_:
        - null
        - nirs4all.operators.transforms.scalers.StandardNormalVariate
        - nirs4all.operators.transforms.nirs.MultiplicativeScatterCorrection
        - class: nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
          params:
            degree: 1
        - nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
      - _or_:
        - null
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            deriv: 2
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
            sigma: 2
        - class: nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
          params:
            level: 3
        - nirs4all.operators.transforms.wavelet_denoise.WaveletDenoise
      - _or_:
        - null
        - nirs4all.operators.transforms.nirs.ASLSBaseline
        - class: nirs4all.operators.transforms.nirs.ASLSBaseline
          params:
            lam: 100000.0
        - nirs4all.operators.transforms.signal.Detrend
      - _or_:
        - null
        - nirs4all.operators.transforms.orthogonalization.OSC
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 2
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 3
        - class: nirs4all.operators.transforms.feature_selection.FlexiblePCA
          params:
            n_components: 0.25
      count: 80
    - class: sklearn.model_selection._split.StratifiedKFold
      params:
        n_splits: 3
        shuffle: true
        random_state: 42
    - model:
        class: lightgbm.LGBMClassifier
        params:
          random_state: 42
          verbose: -1
      name: LightGBM-Finetuned
      finetune_params:
        n_trials: 35
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 100
          - 600
          max_depth:
          - int
          - 3
          - 12
          learning_rate:
          - float_log
          - 0.01
          - 0.2
          num_leaves:
          - int
          - 15
          - 127
          subsample:
          - float
          - 0.7
          - 1.0
    - model:
        class: sklearn.ensemble._forest.RandomForestClassifier
        params:
          random_state: 42
      name: RandomForest-Finetuned
      finetune_params:
        n_trials: 25
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 200
          - 800
          max_depth:
          - int
          - 4
          - 20
          min_samples_leaf:
          - int
          - 1
          - 5
          min_samples_split:
          - int
          - 2
          - 12
    - model:
        class: xgboost.XGBClassifier
        params:
          random_state: 42
          verbosity: 0
      name: XGBoost-Finetuned
      finetune_params:
        n_trials: 35
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 100
          - 600
          max_depth:
          - int
          - 3
          - 10
          learning_rate:
          - float_log
          - 0.01
          - 0.2
          subsample:
          - float
          - 0.7
          - 1.0
          colsample_bytree:
          - float
          - 0.6
          - 1.0
    - model:
        class: sklearn.ensemble._forest.ExtraTreesClassifier
        params:
          random_state: 42
      name: ExtraTrees-Finetuned
      finetune_params:
        n_trials: 20
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 200
          - 800
          max_depth:
          - int
          - 4
          - 20
          min_samples_leaf:
          - int
          - 1
          - 5
    - model:
        class: sklearn.ensemble._gb.GradientBoostingClassifier
        params:
          random_state: 42
      name: GradientBoosting-Finetuned
      finetune_params:
        n_trials: 20
        sampler: tpe
        model_params:
          n_estimators:
          - int
          - 100
          - 500
          learning_rate:
          - float_log
          - 0.01
          - 0.2
          max_depth:
          - int
          - 2
          - 6
          subsample:
          - float
          - 0.7
          - 1.0
