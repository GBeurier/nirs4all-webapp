id: complex_pls
name: Complex PLS
description: Benchmark-style cartesian preprocessing with fixed PLS, tuned PLS, tuned
  Ridge, and AOM-PLS.
complexity: 4
default_variant: regression
variants:
  regression:
    format: yaml
    pipeline:
    - _cartesian_:
      - _or_:
        - null
        - nirs4all.operators.transforms.scalers.StandardNormalVariate
        - nirs4all.operators.transforms.nirs.MultiplicativeScatterCorrection
        - class: nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
          params:
            degree: 1
        - nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
      - _or_:
        - null
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            deriv: 2
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
            sigma: 2
      - _or_:
        - null
        - nirs4all.operators.transforms.nirs.ASLSBaseline
        - nirs4all.operators.transforms.signal.Detrend
      - _or_:
        - null
        - nirs4all.operators.transforms.orthogonalization.OSC
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 2
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 3
      count: 150
    - class: sklearn.model_selection._split.KFold
      params:
        n_splits: 3
        shuffle: true
        random_state: 42
    - class: sklearn.preprocessing._data.StandardScaler
      params:
        with_std: false
    - model:
        class: sklearn.cross_decomposition._pls.PLSRegression
        params:
          n_components: 12
          scale: false
      name: PLS-12
    - model:
        class: sklearn.cross_decomposition._pls.PLSRegression
        params:
          scale: false
      name: PLS-Finetuned
      finetune_params:
        n_trials: 25
        sampler: binary
        model_params:
          n_components:
          - int
          - 1
          - 25
    - model: sklearn.linear_model._ridge.Ridge
      name: Ridge-Finetuned
      finetune_params:
        n_trials: 40
        sampler: tpe
        model_params:
          alpha:
          - float_log
          - 1.0e-05
          - 10000.0
          fit_intercept:
          - categorical
          - - true
            - false
          solver:
          - categorical
          - - auto
            - svd
            - cholesky
            - lsqr
    - model:
        class: nirs4all.operators.models.sklearn.aom_pls.AOMPLSRegressor
        params:
          n_components: 12
          center: true
          scale: false
      name: AOM-PLS
  classification:
    format: yaml
    pipeline:
    - _cartesian_:
      - _or_:
        - null
        - nirs4all.operators.transforms.scalers.StandardNormalVariate
        - nirs4all.operators.transforms.nirs.MultiplicativeScatterCorrection
        - class: nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
          params:
            degree: 1
        - nirs4all.operators.transforms.nirs.ExtendedMultiplicativeScatterCorrection
      - _or_:
        - null
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            polyorder: 2
            deriv: 1
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 15
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 21
            deriv: 2
        - class: nirs4all.operators.transforms.nirs.SavitzkyGolay
          params:
            window_length: 31
            deriv: 2
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
        - class: nirs4all.operators.transforms.signal.Gaussian
          params:
            order: 0
            sigma: 2
      - _or_:
        - null
        - nirs4all.operators.transforms.nirs.ASLSBaseline
        - nirs4all.operators.transforms.signal.Detrend
      - _or_:
        - null
        - nirs4all.operators.transforms.orthogonalization.OSC
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 2
        - class: nirs4all.operators.transforms.orthogonalization.OSC
          params:
            n_components: 3
      count: 150
    - class: sklearn.model_selection._split.StratifiedKFold
      params:
        n_splits: 3
        shuffle: true
        random_state: 42
    - class: sklearn.preprocessing._data.StandardScaler
      params:
        with_std: false
    - model:
        class: nirs4all.operators.models.sklearn.plsda.PLSDA
        params:
          n_components: 12
      name: PLSDA-12
    - model: nirs4all.operators.models.sklearn.plsda.PLSDA
      name: PLSDA-Finetuned
      finetune_params:
        n_trials: 25
        sampler: binary
        model_params:
          n_components:
          - int
          - 1
          - 25
    - model: sklearn.linear_model._ridge.RidgeClassifier
      name: RidgeClassifier-Finetuned
      finetune_params:
        n_trials: 30
        sampler: tpe
        model_params:
          alpha:
          - float_log
          - 1.0e-05
          - 10000.0
          fit_intercept:
          - categorical
          - - true
            - false
    - model:
        class: nirs4all.operators.models.sklearn.aom_pls_classifier.AOMPLSClassifier
        params:
          n_components: 12
      name: AOM-PLS
