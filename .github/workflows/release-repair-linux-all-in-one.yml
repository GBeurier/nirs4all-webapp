name: Repair Linux All-in-one Release Asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to repair (for example: 0.6.0)'
        required: true
        type: string
      source_ref:
        description: 'Branch, tag, or commit to build from'
        required: true
        default: 'main'
        type: string

env:
  NODE_VERSION: '24'

jobs:
  repair-linux-archive:
    name: Rebuild Linux all-in-one
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Resolve tag metadata
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache all-in-one runtime downloads
        uses: actions/cache@v4
        with:
          path: build/.python-cache
          key: archive-pbs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/python-runtime-config.cjs') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            pigz \
            xvfb \
            libgirepository1.0-dev \
            libcairo2-dev \
            gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1

      - name: Install npm dependencies
        run: npm ci

      - name: Update package.json version
        run: npm version ${{ steps.meta.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build Linux all-in-one archive
        run: node scripts/build-archive-standalone.cjs --clean --platform linux --arch x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIRS4ALL_TAR_GZIP_PROGRAM: pigz -9

      - name: Extract archive for smoke test
        id: archive
        run: |
          ARCHIVE_PATH="$(pwd)/release/nirs4all Studio-${{ steps.meta.outputs.version }}-all-in-one-linux-x64.tar.gz"
          EXTRACT_ROOT="$RUNNER_TEMP/archive-smoke"
          rm -rf "$EXTRACT_ROOT"
          mkdir -p "$EXTRACT_ROOT"
          tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_ROOT"
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "extract_root=$EXTRACT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Smoke test staged archive extraction
        run: python3 scripts/smoke-update-zip-permissions.py --archive "${{ steps.archive.outputs.archive_path }}" --platform linux

      - name: Smoke test offline all-in-one launch
        run: xvfb-run -a node scripts/smoke-archive-standalone.cjs --extracted-root "${{ steps.archive.outputs.extract_root }}" --platform linux

      - name: Generate checksum
        run: |
          FILE="${{ steps.archive.outputs.archive_path }}"
          sha256sum "$FILE" > "$FILE.sha256"

      - name: Report archive size
        run: |
          FILE="${{ steps.archive.outputs.archive_path }}"
          SIZE_BYTES="$(stat -c%s "$FILE")"
          SIZE_MIB="$((SIZE_BYTES / 1024 / 1024))"
          echo "Archive size: ${SIZE_BYTES} bytes (${SIZE_MIB} MiB)"

      - name: Upload asset to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          ARCHIVE_PATH="${{ steps.archive.outputs.archive_path }}"
          CHECKSUM_PATH="${ARCHIVE_PATH}.sha256"
          gh release view "$TAG" >/dev/null
          gh release upload "$TAG" "$ARCHIVE_PATH" "$CHECKSUM_PATH" --clobber
